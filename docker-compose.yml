
services:

  observer:

    build:  
      context: .
      dockerfile: docker/go/Dockerfile
      args:
        SERVICE: observer
    networks:
      - db

    depends_on:
      db:
        condition: service_healthy


  db:

    container_name: db
    image: postgres:16
    restart: always

    shm_size: 128mb

    volumes:
      - db:/data/postgres

    ports:
      - "5332:5432"

    networks:
      - db

    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER} 
      PGDATA: /data/postgres
      POSTGRES_DB: db 

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  db:
    driver: bridge

volumes:
  db:

